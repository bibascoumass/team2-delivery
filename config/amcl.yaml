min_particles: 500
max_particles: 2000
kld_err: 0.05
kld_z: 0.99

update_min_d: 0.05
update_min_a: 0.10
resample_interval: 1
transform_tolerance: 0.5
recovery_alpha_slow: 0.001
recovery_alpha_fast: 0.1

odom_frame_id: odom
base_frame_id: base_link
global_frame_id: map
tf_broadcast: true

laser_min_range: 0.20
laser_max_range: 8.0
laser_max_beams: 60
laser_z_hit: 0.8
laser_z_short: 0.1
laser_z_max: 0.05
laser_z_rand: 0.05
laser_sigma_hit: 0.2
laser_lambda_short: 0.1
laser_likelihood_max_dist: 2.0
laser_model_type: likelihood_field

odom_model_type: diff
odom_alpha1: 0.2
odom_alpha2: 0.2
odom_alpha3: 0.2
odom_alpha4: 0.2
